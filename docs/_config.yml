title: "Watsonx Orchestrate ADK Course"
description: "Building Agents with Watsonx Orchestrate ADK - A comprehensive crash course"
baseurl: "/22-05-2026-ADKCrashCourse"
url: "https://nicknochnack.github.io"

# Build settings
markdown: kramdown
remote_theme: just-the-docs/just-the-docs

# Just the Docs theme configuration
color_scheme: dark
search_enabled: true

# Custom CSS
aux_links_new_tab: true

# Enable syntax highlighting
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Custom CSS file
sass:
  style: compressed

# Add custom CSS
head_custom: |
  <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">

# Navigation structure
nav_sort: case_insensitive

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Footer content
footer_content: "Copyright &copy; 2026 Nick Renotte. Distributed under the <a href=\"https://github.com/nicknochnack/22-05-2026-ADKCrashCourse/blob/main/LICENSE\">MIT License</a>."

# Aux links for the upper right navigation
aux_links:
  "Course on GitHub":
    - "https://github.com/nicknochnack/22-05-2026-ADKCrashCourse"

# Makes Aux links open in a new tab
aux_links_new_tab: true

# Enable heading anchors
heading_anchors: true

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - .gitignore